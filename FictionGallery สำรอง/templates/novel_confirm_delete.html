{% extends "base1.html" %}
{% load static %}

{% block title %}
      FictionGallery | FictionDelete
{% endblock title %}


{% block content %}

  <!-- Novel_delete -->
  <div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-lg text-center">
    <!-- ไอคอนเตือน -->
      <div class="flex justify-center mb-4">
          <svg xmlns="http://www.w3.org/2000/svg"
               class="h-16 w-16 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M12 5a7 7 0 100 14 7 7 0 000-14z" />
          </svg>
      </div>

      <!-- หัวข้อ -->
      <h2 class="text-2xl font-bold text-red-600 mb-3">ยืนยันการลบ</h2>
      <p class="text-gray-700 mb-6">
          คุณแน่ใจหรือไม่ว่าต้องการลบเรื่อง<br>
          <b class="text-gray-900">{{ novel.novel_name }}</b> ?
      </p>

      <!-- ปุ่ม -->
      <form method="post" class="flex justify-center gap-4">
          {% csrf_token %}
          <button type="submit"
                  class="bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-lg shadow-md transition">
              🗑️ ลบ
          </button>
          <a href="{% url 'fiction_list' %}"
             class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-5 py-2 rounded-lg shadow-md transition">
              ยกเลิก
          </a>
      </form>
  </div>

{% endblock content %}
