{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FictionGallery</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="font-sans">

  <!-- Navbar -->
  <nav class="bg-gradient-to-r from-sky-400 via-teal-400 to-green-400 shadow-lg">
  <div class="px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">

       <!-- ซ้าย: โลโก้ + เมนู -->
      <div class="flex items-center space-x-6">

      <!-- Logo -->
      <a href="/homeforwriter" class="text-2xl font-bold text-white hover:text-gray-200">FictionGallery</a>

      <!-- เมนูหลัก -->
        <div class="hidden md:flex space-x-6">
          <a href="/homeforwriter" class="text-white hover:text-gray-200">Home</a>

          <!-- Dropdown: Menu -->
            <div class="relative" id="storyDropdown">
                <button id="storyBtn" class="flex items-center text-white hover:text-gray-200">
                    Menu
                    <svg class="w-4 h-4 ml-1" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 10.94l3.71-3.71a.75.75 0 111.06 1.06l-4.24 4.24a.75.75 0 01-1.06 0L5.21 8.29a.75.75 0 01.02-1.08z" clip-rule="evenodd" />
                    </svg>
                </button>
                <div id="storyMenu" class="absolute left-0 mt-2 w-48 bg-white rounded-lg shadow-lg opacity-0 invisible transition duration-200">
                    <a href="/biographyforwriter" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">Writers</a>
                    <a href="/fictionforwriter" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">Fictions</a>
                </div>
            </div>

            <!-- Review -->
            <div class="hidden md:flex space-x-6">
                <a href="/review_for_writer" class="text-white hover:text-gray-200">Reviews</a>
            </div>

            <script>
                const btn = document.getElementById('storyBtn');
                const menu = document.getElementById('storyMenu');

                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    menu.classList.toggle('opacity-0');
                    menu.classList.toggle('invisible');
                    menu.classList.toggle('opacity-100');
                    menu.classList.toggle('visible');
                });

                document.addEventListener('click', () => {
                    menu.classList.add('opacity-0', 'invisible');
                    menu.classList.remove('opacity-100', 'visible');
                });
            </script>


            <!-- Writer Data-->
            <div class="hidden md:flex space-x-6">
                <a href="/writer_list" class="text-white hover:text-gray-200">ข้อมูลนักเขียน</a>
            </div>

            <!--Fiction Data-->
            <div class="hidden md:flex space-x-6">
                <a href="/fiction_list" class="text-white hover:text-gray-200">ข้อมูลนิยาย</a>
            </div>

        </div>
      </div>

      <!-- ขวา: ไอคอนโปรไฟล์ -->
      {% if user.is_authenticated %}
            <!-- ถ้า login แล้ว -->
          <a href="/logout" class="flex items-center space-x-2" title="Logout">
              <span class="text-white font-medium hover:text-gray-200">
                  {{ user.username }}
              </span>
              <img src="https://i.pinimg.com/1200x/3f/d8/e2/3fd8e26a72a395d1cbb3f4ce0486029e.jpg"
                   alt="Profile"
                   class="w-9 h-9 rounded-full object-cover border-2 border-white hover:border-gray-200 shadow-md">
          </a>
      {% else %}
          <!-- ถ้ายังไม่ได้ login -->
          <a href="/login" class="flex items-center space-x-2" title="Login">
              <span class="text-white font-medium hover:text-gray-200">
                  Login
              </span>
              <img src="https://i.pinimg.com/1200x/63/53/d9/6353d9fff14cc31af369dd0254fd8c97.jpg"
                   alt="Login"
                   class="w-9 h-9 rounded-full object-cover border-2 border-white hover:border-gray-200 shadow-md">
          </a>
      {% endif %}

    </div>
  </div>
  </nav>


  <!-- Hero Section -->
  <div class="bg-cover bg-center h-screen"
       style="background-image: url('https://i.pinimg.com/1200x/3d/07/4f/3d074fb2fb642c58ece3e318797af4ba.jpg');">
    <div class="bg-black bg-opacity-60 flex items-center justify-center h-full">
      <div class="text-center text-white">
        <h1 class="text-4xl font-bold mb-4">Welcome to FictionGallery</h1>
        <h5 class="text-lg mb-6">Have fun with fiction</h5>
        <div>
          <a href="/biographyforwriter" class="border border-white px-6 py-2 rounded-lg hover:bg-white hover:text-black m-2">Writers</a>
          <a href="/fictionforwriter" class="border border-white px-6 py-2 rounded-lg hover:bg-white hover:text-black m-2">Fictions</a>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
