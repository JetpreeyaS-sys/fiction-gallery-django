{% extends "base3.html" %}
{% load static %}

{% block title %}
      FictionGallery | WriterCreate
{% endblock title %}

  <!-- ############################################################################### -->

{% block content %}
  <!-- writer create form -->
<div class="max-w-3xl mx-auto bg-white p-10 rounded-3xl shadow-2xl
            mt-16 sm:mt-20 lg:mt-24
            mb-12 sm:mb-16 lg:mb-20
            border border-gray-100 font-sans">

  <h2 class="text-3xl font-extrabold mb-8 text-orange-500 flex items-center gap-2 tracking-wide">
    ✍️ เพิ่มข้อมูลนักเขียน
  </h2>

  <form method="post" enctype="multipart/form-data" class="space-y-6">
    {% csrf_token %}

    <!-- ✅ เก็บค่าตัวกรองเดิม -->
    <input type="hidden" name="filter" value="{{ request.GET.filter }}">


    {% if request.user.is_staff %}
    <!-- แสดง dropdown ให้ admin เลือก user -->
    <div>
      <label class="block text-gray-700 font-semibold mb-2">👤 เลือกผู้ใช้</label>
      <select name="user_id"
        class="w-full border rounded-2xl px-4 py-2 focus:ring-2
        focus:ring-orange-400 focus:outline-none shadow-sm transition">
          <option value="">-- ไม่ระบุ --</option>  <!-- ✅ ตัวเลือกว่าง -->
          {% for u in users %}
              <option value="{{ u.id }}">{{ u.username }}</option>
          {% endfor %}
      </select>
    </div>
    {% endif %}

    <!-- pen_name -->
    <div>
      <label class="block text-gray-700 font-semibold mb-2">🪄 นามปากกา</label>
      <input type="text" name="pen_name" required
        class="w-full border rounded-2xl px-4 py-2 focus:ring-2
        focus:ring-orange-400 focus:outline-none shadow-sm transition duration-200 ease-in-out">
    </div>

    <!-- pen_name_original -->
    <div>
      <label class="block text-gray-700 font-semibold mb-2">📜 ที่มาของนามปากกา</label>
      <textarea name="pen_name_original" rows="6"
        class="w-full border rounded-2xl px-4 py-2 focus:ring-2
        focus:ring-orange-400 focus:outline-none shadow-sm transition"></textarea>
    </div>

    <!-- profile_pic -->
    <div>
      <label class="block text-gray-700 font-semibold mb-2">👤 รูปโปรไฟล์</label>
      <input type="file" name="profile_pic"
        class="w-full border rounded-2xl px-3 py-2 shadow-sm cursor-pointer bg-gray-50 hover:bg-gray-100 transition">
    </div>

    <!-- profile_link -->
    <div>
      <label class="block text-gray-700 font-semibold mb-2">🔗 ลิงก์โปรไฟล์ (ถ้ามี)</label>
      <input type="url" name="profile_link"
        class="w-full border rounded-2xl px-4 py-2 focus:ring-2 focus:ring-orange-400 focus:outline-none shadow-sm transition">
    </div>

    <!-- ปุ่ม -->
    <div class="flex justify-between items-center pt-6">
      <a href="javascript:history.back()"
        class="bg-gray-100 text-gray-800 px-6 py-2 rounded-2xl hover:bg-gray-200 transition shadow-md font-medium">
        ↩️️ ย้อนกลับ
      </a>

      <button type="submit"
        class="bg-orange-500 text-white px-8 py-2 rounded-2xl shadow-md hover:bg-blue-700 transition transform hover:scale-105 font-medium">
        💾 บันทึกข้อมูล
      </button>
    </div>
  </form>
</div>

{% endblock content %}
