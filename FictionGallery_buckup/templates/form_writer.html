{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FictionGallery | WriterForm</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-gradient-to-r from-sky-400 via-teal-400 to-green-400 shadow-lg">
  <div class="px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">

      <!-- Logo -->
      <a href="/homeforwriter" class="text-2xl font-bold text-white hover:text-gray-200">FictionGallery</a>

            <script>
                const btn = document.getElementById('storyBtn');
                const menu = document.getElementById('storyMenu');

                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    menu.classList.toggle('opacity-0');
                    menu.classList.toggle('invisible');
                    menu.classList.toggle('opacity-100');
                    menu.classList.toggle('visible');
                });

                document.addEventListener('click', () => {
                    menu.classList.add('opacity-0', 'invisible');
                    menu.classList.remove('opacity-100', 'visible');
                });
            </script>

      <!-- ขวา: ไอคอนโปรไฟล์ -->
      {% if user.is_authenticated %}
            <!-- ถ้า login แล้ว -->
          <a href="/logout" class="flex items-center space-x-2" title="Logout">
              <span class="text-white font-medium hover:text-gray-200">
                  {{ user.username }}
              </span>
              <img src="https://i.pinimg.com/1200x/32/51/24/32512425d0d617f4096c357d9a969ad1.jpg"
                   alt="Profile"
                   class="w-9 h-9 rounded-full object-cover border-2 border-white hover:border-gray-200 shadow-md">
          </a>
      {% else %}
          <!-- ถ้ายังไม่ได้ login -->
          <a href="/login" class="flex items-center space-x-2" title="Login">
              <span class="text-white font-medium hover:text-gray-200">
                  Login
              </span>
              <img src="https://i.pinimg.com/1200x/42/3a/16/423a16a74ae4078748a94b06cae1c2a9.jpg"
                   alt="Login"
                   class="w-9 h-9 rounded-full object-cover border-2 border-white hover:border-gray-200 shadow-md">
          </a>
      {% endif %}
    </div>
  </div>
  </nav>

  <!-- ############################################################################### -->
  <!-- Writer Form -->
  <div class="max-w-2xl mx-auto mt-20 mb-20 bg-white p-10 rounded-2xl shadow-xl border border-gray-100">
  <h2 class="text-3xl font-bold mb-8 text-center text-orange-500">ข้อมูลนักเขียน</h2>

  <form method="post" enctype="multipart/form-data" class="space-y-6">
    {% csrf_token %}

    <!-- นามปากกา -->
    <div>
      <label class="block text-gray-700 font-medium mb-2">🪄 นามปากกา</label>
      <input type="text" name="pen_name"
             value="{{ profile.pen_name }}"
             class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-orange-300 focus:border-orange-400 transition"
             required>
    </div>

    <!-- ที่มาของนามปากกา -->
    <div>
      <label class="block text-gray-700 font-medium mb-2">📜 ที่มาของนามปากกา</label>
      <textarea name="pen_name_original" rows="6"
                class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-orange-300 focus:border-orange-400 transition">{{ profile.pen_name_original }}</textarea>
    </div>

    <!-- รูปโปรไฟล์ -->
    <div>
      <label class="block text-gray-700 font-medium mb-2">👤 รูปโปรไฟล์</label>
      {% if profile.profile_pic %}
        <div class="mb-3">
          <img src="{{ profile.profile_pic.url }}"
               alt="Profile Picture"
               class="h-28 w-28 rounded-full object-cover border shadow">
        </div>
      {% endif %}
      <input type="file" name="profile_pic" class="w-full text-gray-700">
    </div>

    <!-- ลิงก์โปรไฟล์ -->
    <div>
      <label class="block text-gray-700 font-medium mb-2">🔗 ลิงก์โปรไฟล์ (ถ้ามี)</label>
      <input type="url" name="profile_link"
             value="{{ profile.profile_link }}"
             class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-orange-300 focus:border-orange-400 transition">
    </div>

    <!-- ปุ่มบันทึก -->
    <div class="flex justify-end gap-4">
      <a href="{% url 'writer_dashboard' %}"
         class="px-6 py-2.5 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-100 transition">
        ❌ยกเลิก
      </a>
      <button type="submit"
              class="px-6 py-2.5 rounded-lg bg-orange-500 text-white font-semibold hover:bg-orange-600 shadow-md hover:shadow-lg transition">
        💾บันทึกข้อมูล
      </button>
    </div>
  </form>
</div>

</body>
</html>
