{% extends "baseReview.html" %}
{% load static %}
<!DOCTYPE html>
<html lang="en">

{% block title %}
      FictionGallery | ReviewAdd
{% endblock title %}


<!-- ######################################################## -->

{% block content %}
<!-- Form Create Review -->

<div class="max-w-3xl mx-auto bg-white p-10 rounded-3xl shadow-2xl
            mt-16 sm:mt-20 lg:mt-24
            mb-12 sm:mb-16 lg:mb-20
            border border-gray-100 font-sans">

    <h2 class="text-2xl font-bold text-orange-500 mb-6 text-center">เพิ่มรีวิวนิยาย</h2>

    <form method="post" class="space-y-5">
        {% csrf_token %}

        <!-- เลือกนิยาย -->
        <div>
            <label for="novel" class="block mb-2 font-medium text-gray-700">Select a novel:</label>
            <select name="novel" id="novel"
                    required
                    class="w-full border-gray-300 rounded-lg shadow-sm"
                    data-placeholder="พิมพ์เพื่อค้นหานิยาย...">
                <option></option>
                {% for novel in novels %}
                    <option value="{{ novel.pk }}">{{ novel.novel_name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- ✅ jQuery -->
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <!-- ✅ Select2 JS -->
        <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

        <!-- ✅ เปิดใช้งาน Select2 -->
        <script>
            $(document).ready(function() {
                $('#novel').select2({
                    placeholder: $('#novel').data('placeholder'),
                    allowClear: true,
                    width: '100%'
                });
            });
        </script>

        <!-- ✅ ปรับขนาดกล่อง -->
        <style>
            .select2-container .select2-selection--single {
                height: 45px !important;
                font-size: 1rem;
                padding: 8px 12px;
            }
            .select2-container--default .select2-selection--single .select2-selection__rendered {
                line-height: 45px !important;
            }
            .select2-container--default .select2-selection--single .select2-selection__arrow {
                height: 45px !important;
            }

            /* ✅ จัดข้อความ placeholder ให้อยู่ตรงกลาง */
            .select2-container--default .select2-selection--single .select2-selection__rendered {
                line-height: normal !important;
                display: flex !important;
                align-items: center !important;
                height: 100% !important;
                padding-left: 12px !important;
            }

            /* ปรับลูกศร dropdown */
            .select2-container--default .select2-selection--single .select2-selection__arrow {
                height: 45px !important;
            }

        </style>

        <!-- Rating -->
        <div class="mt-4">
            <label class="block mb-2 font-medium text-gray-700">Give stars:</label>
            <div id="rating-stars" class="flex space-x-3 cursor-pointer text-5xl">
                {% for i in "12345" %}
                    <span class="star text-gray-400 transition-transform transform hover:scale-125"
                          data-value="{{ i }}">★</span>
                {% endfor %}
            </div>
            <input type="hidden" name="rating" id="rating" required>
        </div>

        <!-- ⭐ JavaScript -->
        <script>
            const stars = document.querySelectorAll('.star');
            const ratingInput = document.getElementById('rating');

            stars.forEach(star => {
                star.addEventListener('click', () => {
                    const rating = parseInt(star.getAttribute('data-value'));
                    ratingInput.value = rating;

                    stars.forEach((s, index) => {
                        if (index < rating) {
                            // เปลี่ยนเป็นอิโมจิ ⭐ สีเหลือง
                            s.textContent = '⭐';
                            s.classList.remove('text-gray-400');
                            s.classList.add('text-yellow-400');
                        } else {
                            // กลับไปเป็นดาวปกติสีเทา ★
                            s.textContent = '★';
                            s.classList.remove('text-yellow-400');
                            s.classList.add('text-gray-400');
                        }
                    });
                });
            });
        </script>



        <!-- คอมเมนต์ -->
        <div>
            <label for="comment" class="block mb-2 font-medium text-gray-700">Comments:</label>
            <textarea name="comment" id="comment" required
                      class="w-full h-32 md:h-48 border-gray-300 rounded-lg shadow-sm
                      focus:ring-indigo-500 focus:border-indigo-500">

            </textarea>
        </div>

        <!-- ปุ่ม -->
        <div class="text-center">
            <button type="submit"
                class="px-6 py-2 bg-orange-500 text-white font-semibold rounded-lg shadow hover:bg-indigo-700 transition">
                บันทึกรีวิว
            </button>
        </div>
    </form>
</div>

{% endblock content %}
