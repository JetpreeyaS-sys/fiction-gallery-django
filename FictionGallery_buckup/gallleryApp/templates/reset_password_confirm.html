{% extends "baseLogin.html" %}
{% load static %}

{% block title %}
    FictionGallery | New Password
{% endblock title %}

{% block content %}

  <!-- Container -->
  <div class="min-h-screen flex items-center justify-center bg-gray-100">
      <div class="w-full max-w-md p-8 bg-white rounded-3xl shadow-xl border border-gray-200">

          <h2 class="text-3xl font-extrabold text-center text-gray-700 mb-6">
              ตั้งรหัสผ่านใหม่
          </h2>

          <form method="post" class="space-y-4">
              {% csrf_token %}

              <!-- จัด form ให้ดูดี -->
              <div class="space-y-3">
                  {{ form.as_p }}
              </div>

              <button type="submit"
                      class="w-full py-2.5 bg-green-600 text-white font-medium rounded-xl
                     hover:bg-green-700 transition duration-200 shadow-md">
                  ✅ บันทึกรหัสผ่านใหม่
              </button>
          </form>

      </div>
  </div>

{% endblock content %}
